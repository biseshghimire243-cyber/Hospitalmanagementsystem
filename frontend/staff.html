<div class="main">

<h1>👨‍⚕️ Staff Management</h1>

<form id="staffForm">

<input id="staffName" placeholder="Full Name" required>

<select id="staffRole">

<option>Doctor</option>
<option>Nurse</option>
<option>Receptionist</option>
<option>Pharmacist</option>
<option>Lab Technician</option>

</select>

<input id="staffDepartment" placeholder="Department">

<input id="staffPhone" placeholder="Phone">

<input id="staffEmail" placeholder="Email">

<input type="number" id="staffSalary" placeholder="Salary">

<select id="staffShift">

<option>Morning</option>
<option>Evening</option>
<option>Night</option>

</select>

<input type="date" id="joiningDate">

<select id="staffStatus">

<option>Active</option>
<option>On Leave</option>
<option>Inactive</option>

</select>

<button>Add Staff</button>

</form>

<hr>

<input
id="searchStaff"
placeholder="🔍 Search Staff">

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Role</th>
<th>Department</th>
<th>Phone</th>
<th>Shift</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="staffTable">

</tbody>

</table>

</div>

<script src="script.js"></script>
