<!DOCTYPE html>
<html>
<head>

    <title>Billing</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- Sidebar -->

<div class="sidebar">

    <h2>🏥 HMS</h2>

    <a href="dashboard.html">📊 Dashboard</a>
    <a href="patients.html">👤 Patients</a>
    <a href="doctors.html">👨‍⚕️ Doctors</a>
    <a href="appointments.html">📅 Appointments</a>
    <a href="departments.html">🏥 Departments</a>
    <a href="billing.html" class="active">💰 Billing</a>
    <a href="settings.html">⚙️ Settings</a>

</div>

<!-- Main -->

<div class="main">

<h1>💰 Billing System</h1>

<form id="billForm">

<label>Patient</label>

<select id="billPatient" required>

<option value="">Select Patient</option>

</select>

<label>Doctor</label>

<select id="billDoctor" required>

<option value="">Select Doctor</option>

</select>

<label>Consultation Fee</label>

<input
type="number"
id="consultationFee"
placeholder="Consultation Fee"
required>

<label>Medicine Charge</label>

<input
type="number"
id="medicineFee"
placeholder="Medicine Charge"
value="0">

<label>Lab Test Charge</label>

<input
type="number"
id="labFee"
placeholder="Lab Fee"
value="0">

<label>Total</label>

<input
type="number"
id="totalFee"
readonly>

<label>Payment Status</label>

<select id="paymentStatus">

<option>Paid</option>

<option>Pending</option>

</select>

<button type="submit">

Generate Bill

</button>

</form>

<hr>

<h2>Billing History</h2>

<table>

<thead>

<tr>

<th>ID</th>

<th>Patient</th>

<th>Doctor</th>

<th>Total</th>

<th>Status</th>

<th>Date</th>

<th>Action</th>

</tr>

</thead>

<tbody id="billTable">

</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
