<!DOCTYPE html>
<html>
<head>
    <title>Patients</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <h2>🏥 HMS</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="patients.html">Patients</a>
    <a href="doctors.html">Doctors</a>
    <a href="appointments.html">Appointments</a>
</div>

<div class="main">

    <h1>Patient Management</h1>

    <!-- FORM (FIXED) -->
    <form id="patientForm">

        <input type="text" id="name" placeholder="Patient Name" required>
        <input type="number" id="age" placeholder="Age" required>
        <input type="text" id="gender" placeholder="Gender" required>
        <label>Blood Group</label>
<select id="bloodGroup" required>
    <option value="">Select Blood Group</option>
    <option>A+</option>
    <option>A-</option>
    <option>B+</option>
    <option>B-</option>
    <option>AB+</option>
    <option>AB-</option>
    <option>O+</option>
    <option>O-</option>
</select>
<br><br>

<label>Date of Birth</label>
<input type="date" id="dob" required>

<label>Email</label>
<input type="email" id="email" placeholder="Email Address">

<label>Emergency Contact</label>
<input type="text" id="emergencyContact" placeholder="Emergency Contact">

<label>Address</label>
<textarea
    id="address"
    rows="1"
    placeholder="Patient Address"
></textarea>
        <input type="text" id="phone" placeholder="Phone" required>

<label>Patient Photo</label>

<input
    type="file"
    id="photo"
    accept="image/*"
>

<button type="submit">
    Add Patient
</button>

    </form>

    <!-- TABLE -->
     <div class="search-box">

    <input
        type="text"
        id="searchPatient"
        placeholder="🔍 Search by Name, Phone or Gender..."
    >

</div>
<div class="action-bar">

    <button onclick="exportPatientPDF()">
        📄 Export PDF
    </button>

</div>
    <h2>Patient List</h2>

    <table border="1">
        <thead>
            <tr>
               <th>ID</th>
<th>Photo</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Phone</th>
<th>Action</th>
            </tr>
        </thead>

        <tbody id="patientTable"></tbody>
    </table>

</div>
<!-- Patient Details Modal -->

<br>
<div id="patientModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closePatient()">&times;</span>
        <center>

<img
id="viewPhoto"
class="profile-photo">

</center>

        <h2>👤 Patient Details</h2>

        <hr>

        <p><b>ID:</b> <span id="viewId"></span></p>

        <p><b>Name:</b> <span id="viewName"></span></p>

        <p><b>Age:</b> <span id="viewAge"></span></p>

        <p><b>Gender:</b> <span id="viewGender"></span></p>

        <p><b>Phone:</b> <span id="viewPhone"></span></p>

    </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
