<div class="main">

<h1>🛏 Room Management</h1>

<form id="roomForm">

<input
id="roomNumber"
placeholder="Room Number"
required>

<input
id="bedNumber"
placeholder="Bed Number"
required>

<select id="roomType">

<option>ICU</option>

<option>General Ward</option>

<option>Private Cabin</option>

<option>Emergency</option>

</select>

<input
id="patientName"
placeholder="Patient Name">

<select id="roomStatus">

<option>Available</option>

<option>Occupied</option>

<option>Cleaning</option>

</select>

<input
type="number"
id="dailyCharge"
placeholder="Daily Charge">

<button>

Save Room

</button>

</form>

<hr>

<input
id="searchRoom"
placeholder="🔍 Search Room">

<table>

<thead>

<tr>

<th>ID</th>

<th>Room</th>

<th>Bed</th>

<th>Type</th>

<th>Patient</th>

<th>Status</th>

<th>Charge</th>

<th>Action</th>

</tr>

</thead>

<tbody id="roomTable">

</tbody>

</table>

</div>

<script src="script.js"></script>
